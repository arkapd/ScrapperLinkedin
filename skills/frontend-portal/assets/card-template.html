<div class="job-card">
    <div class="job-header">
        <h3 class="job-title">{{role}}</h3>
        <span class="location-tag">{{location}}</span>
    </div>
    <div class="job-body">
        <p class="company-name">{{company}}</p>
        <p class="job-description">{{snippet}}</p>
    </div>
    <div class="job-footer">
        <div class="contact-info">
            <a href="mailto:{{email}}" class="btn-contact">Email</a>
            <a href="tel:{{phone}}" class="btn-contact">Call</a>
        </div>
        <a href="{{link}}" target="_blank" rel="noopener noreferrer" class="btn-apply">Apply on LinkedIn</a>
    </div>
</div>
